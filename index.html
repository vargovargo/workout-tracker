<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Workout Tracker</title>

    <!-- Open Graph / link preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vargovargo.github.io/workout-tracker/" />
    <meta property="og:title" content="Workout Tracker" />
    <meta property="og:description" content="Track your weekly workouts with streaks and celebrations" />
    <meta property="og:image" content="https://vargovargo.github.io/workout-tracker/icons/icon-512.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="description" content="Track your weekly workouts with streaks and celebrations" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Workout Tracker" />
    <meta name="twitter:description" content="Track your weekly workouts with streaks and celebrations" />
    <meta name="twitter:image" content="https://vargovargo.github.io/workout-tracker/icons/icon-512.png" />

    <!-- Favicon: SVG for modern browsers, PNG fallback for Safari -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Workouts" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent flash of light background -->
    <style>
      html, body { background-color: #0f172a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
